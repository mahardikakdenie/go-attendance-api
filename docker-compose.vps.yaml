services:
  app:
    image: ${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG:-latest}
    container_name: attendance-api
    restart: always
    ports:
      - "8002:${APP_PORT:-8002}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance_network

  db:
    image: postgres:16-alpine
    container_name: attendance-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-admin}
      - POSTGRES_DB=${DB_NAME:-attendance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-attendance_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendance_network

  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      retries: 5
    networks:
      - attendance_network

networks:
  attendance_network:
    driver: bridge

volumes:
  postgres_data:
