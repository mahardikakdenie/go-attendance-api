basePath: /
definitions:
  model.AttendanceAction:
    enum:
    - clock_in
    - clock_out
    type: string
    x-enum-varnames:
    - ClockIn
    - ClockOut
  model.AttendanceRequest:
    properties:
      action:
        allOf:
        - $ref: '#/definitions/model.AttendanceAction'
        enum:
        - clock_in
        - clock_out
        example: clock_in
      latitude:
        example: -6.1339179
        type: number
      longitude:
        example: 106.8329504
        type: number
      media_url:
        example: https://i.pinimg.com/control1/736x/41/e7/99/41e799436291fdfb4c969b80913a19fe.jpg
        type: string
    required:
    - action
    - latitude
    - longitude
    type: object
  model.LoginRequest:
    properties:
      email:
        example: admin@yopmail.com
        type: string
      password:
        example: "123456"
        type: string
    required:
    - email
    - password
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  model.Tenant:
    properties:
      code:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for HRD Attendance System
  title: HRD Attendance API
  version: "1.0"
paths:
  /api/v1/attendance:
    get:
      description: Get attendance list with filter & pagination
      parameters:
      - description: User ID
        in: query
        name: user_id
        type: integer
      - description: Status (working, done, late)
        in: query
        name: status
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: Limit (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get All Attendance
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Record clock-in / clock-out with face & location
      parameters:
      - description: Attendance Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AttendanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Record Attendance
      tags:
      - Attendance
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Login employee
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Register new employee
      tags:
      - Auth
  /api/v1/ping:
    get:
      description: Check API status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health Check
      tags:
      - Health
  /api/v1/tenants:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get All Tenants
      tags:
      - Tenant
    post:
      consumes:
      - application/json
      parameters:
      - description: Tenant Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.Tenant'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Create Tenant
      tags:
      - Tenant
  /api/v1/tenants/{id}:
    get:
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get Tenant By ID
      tags:
      - Tenant
  /api/v1/users:
    get:
      consumes:
      - application/json
      description: Get list of users with dynamic filter and sorting
      parameters:
      - description: Filter by Name
        in: query
        name: name
        type: string
      - description: Filter by Email
        in: query
        name: email
        type: string
      - description: Order by field (e.g., name, created_at)
        in: query
        name: order_by
        type: string
      - description: Sort direction (asc or desc)
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get All Users
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
