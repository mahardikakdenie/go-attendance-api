basePath: /
definitions:
  model.AttendanceAction:
    enum:
    - clock_in
    - clock_out
    type: string
    x-enum-varnames:
    - ClockIn
    - ClockOut
  model.AttendanceListResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/model.Meta'
    type: object
  model.AttendanceRequest:
    properties:
      action:
        allOf:
        - $ref: '#/definitions/model.AttendanceAction'
        enum:
        - clock_in
        - clock_out
        example: clock_in
      latitude:
        example: -6.1339179
        type: number
      longitude:
        example: 106.8329504
        type: number
      media_url:
        example: https://i.pinimg.com/control1/736x/41/e7/99/41e799436291fdfb4c969b80913a19fe.jpg
        type: string
    required:
    - action
    - latitude
    - longitude
    type: object
  model.BaseResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        example: admin@yopmail.com
        type: string
      password:
        example: "123456"
        type: string
    required:
    - email
    - password
    type: object
  model.Meta:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  model.RegisterRequest:
    properties:
      email:
        example: budi@company.com
        type: string
      name:
        example: Budi Santoso
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
      tenant_id:
        example: 1
        type: integer
    required:
    - email
    - name
    - password
    - tenant_id
    type: object
  model.Tenant:
    properties:
      code:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  model.TenantSetting:
    properties:
      allowMultipleCheck:
        example: false
        type: boolean
      allowRemote:
        example: false
        type: boolean
      clockInEndTime:
        example: "09:00"
        type: string
      clockInStartTime:
        example: "07:00"
        type: string
      clockOutEndTime:
        example: "23:00"
        type: string
      clockOutStartTime:
        example: "16:00"
        type: string
      createdAt:
        type: string
      id:
        type: integer
      lateAfterMinute:
        example: 480
        type: integer
      maxRadiusMeter:
        example: 100
        type: number
      officeLatitude:
        example: -6.1339179
        type: number
      officeLongitude:
        example: 106.8329504
        type: number
      requireLocation:
        example: true
        type: boolean
      requireSelfie:
        example: true
        type: boolean
      tenantID:
        example: 1
        type: integer
      updatedAt:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for HRD Attendance System
  title: HRD Attendance API
  version: "1.0"
paths:
  /api/v1/attendance:
    get:
      description: Get attendance list with filter & pagination
      parameters:
      - description: User ID
        in: query
        name: user_id
        type: integer
      - description: Status (working, done, late)
        in: query
        name: status
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: Limit (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.AttendanceListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.BaseResponse'
      security:
      - BearerAuth: []
      summary: Get All Attendance
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Record clock-in / clock-out with face & location
      parameters:
      - description: Attendance Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AttendanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.BaseResponse'
      security:
      - BearerAuth: []
      summary: Record Attendance
      tags:
      - Attendance
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Login employee
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Register new employee
      tags:
      - Auth
  /api/v1/ping:
    get:
      description: Check API status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.BaseResponse'
      summary: Health Check
      tags:
      - Health
  /api/v1/tenant-setting:
    get:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Tenant Setting
      tags:
      - Tenant Setting
    put:
      consumes:
      - application/json
      parameters:
      - description: Tenant Setting
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.TenantSetting'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update Tenant Setting
      tags:
      - Tenant Setting
  /api/v1/tenants:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get All Tenants
      tags:
      - Tenant
    post:
      consumes:
      - application/json
      parameters:
      - description: Tenant Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.Tenant'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Create Tenant
      tags:
      - Tenant
  /api/v1/tenants/{id}:
    get:
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get Tenant By ID
      tags:
      - Tenant
  /api/v1/users:
    get:
      description: Get list of users with filter, sorting, and pagination
      parameters:
      - description: Filter by Name
        in: query
        name: name
        type: string
      - description: Filter by Email
        in: query
        name: email
        type: string
      - description: Filter by Role (admin, manager, employee)
        in: query
        name: role
        type: string
      - description: Limit (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Order by field
        in: query
        name: order_by
        type: string
      - description: Sort direction (asc/desc)
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get All Users
      tags:
      - Users
  /api/v1/users/{id}:
    get:
      description: Get single user detail
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get User By ID
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
