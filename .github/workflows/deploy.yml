name: CI/CD Deployment

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/go-attendance-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/go-attendance-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.vps.yaml,Makefile.vps,.env.prod"
          target: "/opt/projects/go-attendance-api"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Tentukan target directory
            TARGET_DIR="/opt/projects/go-attendance-api"
            
            # Cek apakah folder /opt/projects bisa diakses, jika tidak gunakan HOME sebagai backup
            if [ ! -w "/opt" ] && [ ! -d "$TARGET_DIR" ]; then
              echo "PERINGATAN: Tidak punya akses tulis ke /opt. Mencoba menggunakan sudo..."
              # Mencoba membuat folder dengan sudo (ini akan gagal jika butuh password)
              sudo mkdir -p $TARGET_DIR || true
              sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} $TARGET_DIR || true
            fi
            
            # Jika tetap tidak bisa diakses, informasikan dan buat di home sebagai fallback agar tidak error
            if [ ! -w "$TARGET_DIR" ] && [ ! -d "$TARGET_DIR" ]; then
               echo "ERROR: Gagal membuat direktori di /opt/projects. Silakan buat manual di VPS dengan: sudo mkdir -p $TARGET_DIR && sudo chown ${{ secrets.VPS_USER }} $TARGET_DIR"
               exit 1
            fi

            cd $TARGET_DIR
            
            # Buat file .env dari file .env.prod yang dikirim lewat SCP
            if [ -f .env.prod ]; then
              mv .env.prod .env
              echo ".env.prod moved to .env"
            fi
            
            # Rename file konfigurasi
            [ -f docker-compose.vps.yaml ] && mv docker-compose.vps.yaml docker-compose.yaml
            [ -f Makefile.vps ] && mv Makefile.vps Makefile
            
            # Login & Deploy
            echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            docker compose pull
            docker compose up -d
            docker image prune -f
