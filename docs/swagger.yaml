basePath: /
definitions:
  handler.EmailRequest:
    properties:
      html:
        type: string
      subject:
        type: string
      to:
        items:
          type: string
        type: array
    required:
    - html
    - subject
    - to
    type: object
  handler.UpdateProfilePhotoRequest:
    properties:
      media_url:
        type: string
    required:
    - media_url
    type: object
  model.ApproveOvertimeRequest:
    properties:
      admin_notes:
        type: string
    type: object
  model.ApproveUserChangeRequest:
    properties:
      admin_notes:
        type: string
    type: object
  model.Attendance:
    properties:
      clockInLatitude:
        type: number
      clockInLongitude:
        type: number
      clockInMediaUrl:
        type: string
      clockInTime:
        type: string
      clockOutLatitude:
        format: float64
        type: number
      clockOutLongitude:
        format: float64
        type: number
      clockOutMediaUrl:
        type: string
      clockOutTime:
        type: string
      id:
        type: string
      status:
        $ref: '#/definitions/model.AttendanceStatus'
      tenant:
        $ref: '#/definitions/model.Tenant'
      tenantID:
        type: integer
      user:
        $ref: '#/definitions/model.User'
      userID:
        type: integer
    type: object
  model.AttendanceAction:
    enum:
    - clock_in
    - clock_out
    type: string
    x-enum-varnames:
    - ClockIn
    - ClockOut
  model.AttendanceRequest:
    properties:
      action:
        allOf:
        - $ref: '#/definitions/model.AttendanceAction'
        enum:
        - clock_in
        - clock_out
        example: clock_in
      latitude:
        example: -6.1339179
        type: number
      longitude:
        example: 106.8329504
        type: number
      media_url:
        example: https://i.pinimg.com/control1/736x/41/e7/99/41e799436291fdfb4c969b80913a19fe.jpg
        type: string
    required:
    - action
    - latitude
    - longitude
    type: object
  model.AttendanceResponse:
    properties:
      clock_in_latitude:
        type: number
      clock_in_longitude:
        type: number
      clock_in_media_url:
        type: string
      clock_in_time:
        type: string
      clock_out_latitude:
        type: number
      clock_out_longitude:
        type: number
      clock_out_media_url:
        type: string
      clock_out_time:
        type: string
      id:
        type: string
      status:
        $ref: '#/definitions/model.AttendanceStatus'
      user:
        $ref: '#/definitions/model.UserResponse'
      user_id:
        type: integer
    type: object
  model.AttendanceStatus:
    enum:
    - working
    - done
    - late
    type: string
    x-enum-varnames:
    - StatusWorking
    - StatusDone
    - StatusLate
  model.AttendanceSummaryResponse:
    properties:
      late_summary:
        type: integer
      late_summary_diff:
        type: number
      ontime_summary:
        type: integer
      ontime_summary_diff:
        type: number
      total_record:
        type: integer
      total_record_diff:
        type: number
    type: object
  model.CreateOvertimeRequest:
    properties:
      date:
        example: "2026-04-08"
        type: string
      end_time:
        example: "19:00"
        type: string
      reason:
        type: string
      start_time:
        example: "17:00"
        type: string
    required:
    - date
    - end_time
    - reason
    - start_time
    type: object
  model.CreateUserChangeRequest:
    properties:
      address:
        type: string
      department:
        type: string
      email:
        type: string
      name:
        type: string
      phone_number:
        type: string
    required:
    - email
    - name
    type: object
  model.CreateUserRequest:
    properties:
      address:
        example: Jl. Sudirman No. 1
        type: string
      department:
        example: IT
        type: string
      email:
        example: budi@company.com
        type: string
      name:
        example: Budi Santoso
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
      phone_number:
        example: "08123456789"
        type: string
      role_id:
        example: 1
        type: integer
      tenant_id:
        example: 1
        type: integer
    required:
    - email
    - name
    - password
    type: object
  model.ImageMeta:
    properties:
      extension:
        type: string
      filename:
        type: string
      mime:
        type: string
      name:
        type: string
      url:
        type: string
    type: object
  model.LoginRequest:
    properties:
      email:
        example: admin@yopmail.com
        type: string
      password:
        example: "123456"
        type: string
    required:
    - email
    - password
    type: object
  model.Media:
    properties:
      created_at:
        type: string
      id:
        type: integer
      imgbb_id:
        type: string
      meta:
        $ref: '#/definitions/model.Meta'
      type:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  model.Meta:
    properties:
      delete_url:
        type: string
      display_url:
        type: string
      expiration:
        type: integer
      height:
        type: integer
      id:
        type: string
      image:
        $ref: '#/definitions/model.ImageMeta'
      size:
        type: integer
      thumb:
        $ref: '#/definitions/model.ImageMeta'
      time:
        type: integer
      title:
        type: string
      url:
        type: string
      url_viewer:
        type: string
      width:
        type: integer
    type: object
  model.OvertimeResponse:
    properties:
      admin_notes:
        type: string
      created_at:
        type: string
      date:
        type: string
      end_time:
        type: string
      id:
        type: integer
      reason:
        type: string
      start_time:
        type: string
      status:
        $ref: '#/definitions/model.OvertimeStatus'
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.UserResponse'
      user_id:
        type: integer
    type: object
  model.OvertimeStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - OvertimeStatusPending
    - OvertimeStatusApproved
    - OvertimeStatusRejected
  model.RecentActivity:
    properties:
      action:
        type: string
      created_at:
        type: string
      id:
        type: integer
      status:
        type: string
      title:
        type: string
      user_id:
        type: integer
    type: object
  model.RecentActivityResponse:
    properties:
      action:
        type: string
      created_at:
        type: string
      id:
        type: integer
      status:
        type: string
      title:
        type: string
    type: object
  model.RegisterRequest:
    properties:
      address:
        example: Jl. Sudirman No. 1
        type: string
      department:
        example: IT
        type: string
      email:
        example: budi@company.com
        type: string
      name:
        example: Budi Santoso
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
      phone_number:
        example: "08123456789"
        type: string
      role_id:
        example: 1
        type: integer
      tenant_id:
        example: 1
        type: integer
    required:
    - email
    - name
    - password
    - tenant_id
    type: object
  model.Role:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        example: admin
        type: string
      updated_at:
        type: string
    type: object
  model.RoleResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  model.Tenant:
    properties:
      code:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      tenant_settings:
        $ref: '#/definitions/model.TenantSetting'
      updatedAt:
        type: string
    type: object
  model.TenantResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      tenant_settings:
        $ref: '#/definitions/model.TenantSetting'
    type: object
  model.TenantSetting:
    properties:
      allow_multiple_check:
        example: false
        type: boolean
      allow_remote:
        example: false
        type: boolean
      clock_in_end_time:
        example: "09:00"
        type: string
      clock_in_start_time:
        example: "07:00"
        type: string
      clock_out_end_time:
        example: "23:00"
        type: string
      clock_out_start_time:
        example: "16:00"
        type: string
      created_at:
        example: "2026-04-07T13:21:24Z"
        type: string
      id:
        example: 1
        type: integer
      late_after_minute:
        example: 480
        type: integer
      max_radius_meter:
        example: 100
        type: number
      office_latitude:
        example: -6.1339179
        type: number
      office_longitude:
        example: 106.8329504
        type: number
      require_location:
        example: true
        type: boolean
      require_selfie:
        example: true
        type: boolean
      tenant:
        $ref: '#/definitions/model.Tenant'
      tenant_id:
        example: 1
        type: integer
      updated_at:
        example: "2026-04-07T13:21:24Z"
        type: string
    type: object
  model.User:
    properties:
      address:
        example: Jl. Sudirman No. 1
        type: string
      attendances:
        items:
          $ref: '#/definitions/model.Attendance'
        type: array
      created_at:
        example: "2026-04-05T12:00:00Z"
        type: string
      department:
        example: IT
        type: string
      email:
        example: budi@company.com
        type: string
      employee_id:
        example: FT-001
        type: string
      id:
        example: 1
        type: integer
      media_url:
        example: https://cdn.example.com/profile/budi.jpg
        type: string
      name:
        example: Budi Santoso
        maxLength: 100
        minLength: 3
        type: string
      phone_number:
        example: "08123456789"
        type: string
      recent_activities:
        items:
          $ref: '#/definitions/model.RecentActivity'
        type: array
      role:
        $ref: '#/definitions/model.Role'
      role_id:
        example: 1
        type: integer
      tenant:
        $ref: '#/definitions/model.Tenant'
      tenant_id:
        example: 1
        type: integer
      updated_at:
        example: "2026-04-05T12:30:00Z"
        type: string
    required:
    - email
    - name
    type: object
  model.UserChangeRequestResponse:
    properties:
      address:
        type: string
      admin_notes:
        type: string
      created_at:
        type: string
      department:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      phone_number:
        type: string
      status:
        $ref: '#/definitions/model.UserChangeRequestStatus'
      tenant_id:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/model.UserResponse'
      user_id:
        type: integer
    type: object
  model.UserChangeRequestStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusApproved
    - StatusRejected
  model.UserResponse:
    properties:
      address:
        example: Jl. Sudirman No. 1
        type: string
      attendances:
        items:
          $ref: '#/definitions/model.AttendanceResponse'
        type: array
      created_at:
        type: string
      department:
        example: IT
        type: string
      email:
        example: budi@company.com
        type: string
      employee_id:
        example: FT-001
        type: string
      id:
        example: 1
        type: integer
      media_url:
        example: https://cdn.example.com/profile/budi.jpg
        type: string
      name:
        example: Budi Santoso
        type: string
      phone_number:
        example: "08123456789"
        type: string
      recent_activities:
        items:
          $ref: '#/definitions/model.RecentActivityResponse'
        type: array
      role:
        $ref: '#/definitions/model.RoleResponse'
      tenant:
        $ref: '#/definitions/model.TenantResponse'
      tenant_id:
        example: 1
        type: integer
    type: object
  modelDto.AttendanceListResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/modelDto.Meta'
    type: object
  modelDto.BaseResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
  modelDto.Meta:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
info:
  contact: {}
  description: API documentation for HRD Attendance System
  title: HRD Attendance API
  version: "1.0"
paths:
  /api/v1/attendance:
    get:
      description: Get attendance list with filter & pagination
      parameters:
      - description: User ID
        in: query
        name: user_id
        type: integer
      - description: Status
        in: query
        name: status
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: 'Relations: user,tenant,setting'
        in: query
        name: include
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/modelDto.AttendanceListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Get All Attendance
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Record clock-in / clock-out with face & location
      parameters:
      - description: Attendance Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AttendanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.AttendanceResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Record Attendance
      tags:
      - Attendance
  /api/v1/attendance/summary:
    get:
      description: Get summary of today's attendance with comparison
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.AttendanceSummaryResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Get Attendance Summary
      tags:
      - Attendance
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      summary: Login employee
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      summary: Logout user
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      summary: Register new employee
      tags:
      - Auth
  /api/v1/email/test:
    post:
      consumes:
      - application/json
      description: Send a test email
      parameters:
      - description: Email Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.EmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      summary: Send Test Email
      tags:
      - Email
  /api/v1/media/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload image file and store metadata to database
      parameters:
      - description: Upload file (file/image/media)
        in: formData
        name: file
        type: file
      - description: Upload image
        in: formData
        name: image
        type: file
      - description: Upload media
        in: formData
        name: media
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.Media'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      summary: Upload image to imgbb
      tags:
      - Media
  /api/v1/overtime:
    get:
      description: Get overtime list with filters
      parameters:
      - description: Status
        in: query
        name: status
        type: string
      - description: User ID
        in: query
        name: user_id
        type: integer
      - description: YYYY-MM-DD
        in: query
        name: date_from
        type: string
      - description: YYYY-MM-DD
        in: query
        name: date_to
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/modelDto.AttendanceListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Get All Overtime
      tags:
      - Overtime
    post:
      consumes:
      - application/json
      description: Employee request overtime
      parameters:
      - description: Overtime Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.CreateOvertimeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.OvertimeResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Create Overtime Request
      tags:
      - Overtime
  /api/v1/overtime/{id}:
    get:
      parameters:
      - description: ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.OvertimeResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Get Overtime By ID
      tags:
      - Overtime
  /api/v1/overtime/approve/{id}:
    post:
      consumes:
      - application/json
      description: Manager/Admin approve overtime
      parameters:
      - description: Overtime ID
        in: path
        name: id
        required: true
        type: integer
      - description: Notes
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ApproveOvertimeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.OvertimeResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Approve Overtime Request
      tags:
      - Overtime
  /api/v1/overtime/reject/{id}:
    post:
      consumes:
      - application/json
      description: Manager/Admin reject overtime
      parameters:
      - description: Overtime ID
        in: path
        name: id
        required: true
        type: integer
      - description: Notes
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ApproveOvertimeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/modelDto.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.OvertimeResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/modelDto.BaseResponse'
      security:
      - CookieAuth: []
      summary: Reject Overtime Request
      tags:
      - Overtime
  /api/v1/ping:
    get:
      description: Check API status
      produces:
      - application/json
      responses: {}
      summary: Health Check
