host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: |-
    A robust and scalable attendance management API built with Go, Gin Gonic, and GORM.
    Featuring role-based access control, tenant management, and integration with PostgreSQL and Redis.
    This project includes comprehensive user features, attendance tracking, overtime management, and user activity logs.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Go Attendance API
  version: 1.0.0
paths:
  /api/v1/activities/quick-info:
    get:
      description: Get summary counters for pending leaves, overtimes, and notifications
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/modelDto.QuickInfoResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get Dashboard Quick Info
      tags:
      - Activity
  /api/v1/activities/recent:
    get:
      description: Get combined recent activities for the logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.RecentActivityResponse'
                  type: array
              type: object
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get Recent Activities
      tags:
      - Activity
  /api/v1/attendance:
    get:
      description: Get attendance list with filter & pagination
      parameters:
      - description: User ID
        in: query
        name: user_id
        type: integer
      - description: Status
        in: query
        name: status
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: 'Relations: user,tenant,setting'
        in: query
        name: include
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/modelDto.AttendanceListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get All Attendance
      tags:
      - Attendance
    post:
      consumes:
      - application/json
      description: Record clock-in / clock-out with face & location
      parameters:
      - description: Attendance Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AttendanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.AttendanceResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.APIResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Record Attendance
      tags:
      - Attendance
  /api/v1/attendance/history:
    get:
      description: Get attendance history with specific format for dashboard
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Page
        in: query
        name: page
        type: integer
      - description: Status filter
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/modelDto.AttendanceHistoryItem'
                  type: array
              type: object
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: Get Attendance History
      tags:
      - Attendance
  /api/v1/attendance/summary:
    get:
      description: Get summary of today's attendance with comparison
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.AttendanceSummaryResponse'
              type: object
        "500":
