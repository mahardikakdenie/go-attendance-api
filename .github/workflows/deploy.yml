name: CI/CD Deployment

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/go-attendance-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/go-attendance-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.vps.yaml,Makefile.vps"
          target: "~/go-attendance-api"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Pastikan folder ada
            mkdir -p ~/go-attendance-api
            cd ~/go-attendance-api
            
            # Buat file .env langsung dari GitHub Secret
            echo "${{ secrets.ENV_PROD }}" > .env
            
            # Rename file konfigurasi
            [ -f docker-compose.vps.yaml ] && mv docker-compose.vps.yaml docker-compose.yaml
            [ -f Makefile.vps ] && mv Makefile.vps Makefile
            
            # Login & Deploy
            echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            docker compose pull
            docker compose up -d
            docker image prune -f
